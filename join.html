<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join Classroom Buzzer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="join">
  <main class="app">
    <section id="setup" class="card">
      <h1>Join Buzzer Room</h1>
      <p class="muted">Enter the room code from your teacher. Rooms only work after the teacher opens them.</p>

      <div id="studentSetup" class="setupPanel setupPanelSingle">
        <p class="label">Student</p>
        <h2>Join a room</h2>
        <label>
          Room code
          <input id="roomInput" autocomplete="off" autocapitalize="characters" spellcheck="false" maxlength="20" placeholder="e.g. J4K9Q2" />
        </label>
        <label>
          Your name
          <input id="nameInput" autocomplete="name" maxlength="30" placeholder="e.g. Team 1" />
        </label>
        <div class="actions">
          <button id="joinBtn" class="primary" type="button">Join room</button>
        </div>
      </div>

      <p id="setupError" class="error" aria-live="polite"></p>
    </section>

    <section id="game" class="card hidden" aria-live="polite">
      <div class="topbar">
        <div>
          <p class="label">Room</p>
          <h2 id="roomTitle">-</h2>
        </div>
        <div id="shareActions" class="roomActions hidden">
          <button id="copyLinkBtn" type="button">Copy student link</button>
          <button id="openJoinLinkBtn" type="button">Open join screen</button>
          <button id="copyCodeBtn" type="button">Copy code</button>
          <button id="soundToggleBtn" type="button">Sound on</button>
        </div>
      </div>
      <p id="copyStatus" class="toast" aria-live="polite"></p>

      <div class="roomStats" aria-label="Room summary">
        <div>
          <p class="label">Round</p>
          <p id="roundValue">1</p>
        </div>
        <div>
          <p class="label">Online</p>
          <p id="onlineValue">0</p>
        </div>
        <div>
          <p class="label">Students</p>
          <p id="playerCountValue">0</p>
        </div>
      </div>

      <div id="status" class="status waiting">
        <p class="label">Status</p>
        <p id="statusText">Waiting...</p>
      </div>

      <button id="buzzBtn" class="buzz" type="button">BUZZ</button>

      <div id="hostControls" class="host hidden">
        <h3>Host controls</h3>
        <button id="resetBtn" class="primary" type="button">Reset buzzer</button>
        <button id="lockBtn" type="button">Lock without winner</button>
        <button id="clearBtn" class="danger" type="button">Clear room</button>
      </div>

      <section>
        <h3>Players</h3>
        <ul id="playersList" class="players"></ul>
      </section>

      <section>
        <h3>Buzz history</h3>
        <ol id="historyList" class="history"></ol>
      </section>

      <button id="leaveBtn" type="button" class="linkish">Leave room</button>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
